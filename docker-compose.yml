version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: almaflow-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: almaflow
      POSTGRES_PASSWORD: almaflow
      POSTGRES_DB: almaflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: almaflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
